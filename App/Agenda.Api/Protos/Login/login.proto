syntax = "proto3";

option csharp_namespace = "Agenda.Api";

package login;

service Login {
  rpc Login (LoginRequest) returns (LoginReply);
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginReply {
  bool authorized = 1;
  string token = 2;
  int32 tokenExpirationMin = 3;
  string refreshToken = 4;
  int32 refreshTokenExpirationHour = 5;
}