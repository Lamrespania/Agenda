syntax = "proto3";

option csharp_namespace = "Agenda.Api";

import "Protos/User/Role.proto";

package insert;

service Insert {
  rpc Insert (InsertRequest) returns (InsertReply);
}

message InsertRequest {
  string username = 1;
  string password = 2;
  Role role = 3;
}

message InsertReply {
  int32 id = 1;
  string message = 2;
}